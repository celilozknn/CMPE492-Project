version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: chainflow_postgres
    restart: always
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - chainflow_data:/var/lib/postgresql/data

volumes:
  chainflow_data:
