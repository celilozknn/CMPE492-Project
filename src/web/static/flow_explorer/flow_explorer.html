<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainFlow — Flow Explorer</title>
  <link rel="stylesheet" href="/static/base.css" />
  <link rel="stylesheet" href="/static/flow_explorer/flow_explorer.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">ChainFlow</a>
  <a class="navbar-link" href="/">Home</a>
  <a class="navbar-link" href="/graph">PageRank Explorer</a>
  <a class="navbar-link active" href="/flow">Flow Explorer</a>
</nav>

<div class="container" style="padding: 40px 20px;">

  <div style="margin-bottom:32px;">
    <h1 style="font-size:28px; margin-bottom:6px;">Flow Explorer</h1>
    <p>Investigate transfer history and behavior of any wallet address.</p>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <input id="address-input" type="text" placeholder="Enter wallet address (0x...)" spellcheck="false" />
    <select id="network-select"></select>
    <select id="token-select"><option value="">All tokens</option></select>
    <button id="search-btn">Search</button>
  </div>

  <div style="margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
    <span style="font-size:12px; color:#64748b;">Try a sample address:</span>
    <div id="sample-list" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
    <button id="sample-btn" style="width:auto; margin-top:0; padding:5px 12px; font-size:12px;">↻ Generate</button>
  </div>

  <div id="error-msg" style="display:none; color:#f87171; font-size:13px; margin-top:12px;"></div>

  <!-- Results -->
  <div id="results" style="display:none;">

    <!-- Summary Cards -->
    <div class="summary-grid" id="summary-cards"></div>

    <!-- Two columns: transfers + top counterparties -->
    <div class="flow-columns">

      <div class="flow-panel">
        <div class="panel-header">
          <h3>Recent Transfers</h3>
          <div class="dir-tabs">
            <button class="dir-tab active" data-dir="all">All</button>
            <button class="dir-tab" data-dir="sent">Sent</button>
            <button class="dir-tab" data-dir="received">Received</button>
          </div>
        </div>
        <div id="transfers-table-wrap">
          <table id="transfers-table">
            <thead>
              <tr>
                <th>Time</th>
                <th>Dir</th>
                <th>Counterparty</th>
                <th>Token</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody id="transfers-body"></tbody>
          </table>
        </div>
      </div>

      <div class="flow-panel">
        <div class="panel-header">
          <h3>Top Counterparties</h3>
          <p style="font-size:12px; color:#64748b; margin:0;">By total volume</p>
        </div>
        <div id="counterparties-list"></div>
      </div>

    </div>
  </div>

</div>

<script src="/static/flow_explorer/flow_explorer.js"></script>
</body>
</html>
