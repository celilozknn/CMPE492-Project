<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainFlow — PageRank Explorer</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="/static/base.css" />
</head>

<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">ChainFlow</a>
  <a class="navbar-link" href="/">Home</a>
  <a class="navbar-link active" href="/graph">PageRank Explorer</a>
  <a class="navbar-link" href="/flow">Flow Explorer</a>
</nav>

<svg id="graph"></svg>

<div id="ui">
  <h2>PageRank Explorer</h2>

  <div class="control-group">
    <label for="network">Network</label>
    <select id="network">
      <option value="">Loading...</option>
    </select>
  </div>

  <div class="control-group">
    <label for="token">Asset</label>
    <select id="token">
      <option value="">All assets</option>
    </select>
  </div>

  <div class="control-group">
    <label for="topN">Top Wallets</label>
    <input id="topN" type="number" value="100" min="1" max="1000" />
  </div>

  <button id="refresh">Analyze</button>

  <p id="graph-status" class="info-text">Click Analyze to generate the graph.</p>
  <p class="info-text">Drag nodes to explore. Hover to see details. Larger nodes have higher PageRank scores.</p>

</div>

<div id="tooltip" style="
  display:none; position:fixed; pointer-events:none;
  background:rgba(15,23,42,0.95); border:1px solid rgba(148,163,184,0.2);
  padding:10px 14px; border-radius:8px; max-width:260px;
  backdrop-filter:blur(10px); z-index:2000;
"></div>

<script src="/static/pagerank/pagerank.js"></script>

</body>
</html>
