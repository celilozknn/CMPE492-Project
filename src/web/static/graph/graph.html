<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainFlow - PageRank Analysis</title>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="/static/base.css" />
</head>

<body>

<svg id="graph"></svg>

<div id="ui">
  <h2>PageRank Analysis</h2>

  <div class="control-group">
    <label for="network">Network</label>
    <select id="network">
      <option value="">Loading...</option>
    </select>
  </div>

  <div class="control-group">
    <label for="token">Asset</label>
    <select id="token">
      <option value="">All assets</option>
    </select>
  </div>

  <div class="control-group">
    <label for="topN">Top Wallets</label>
    <input id="topN" type="number" value="50" min="1" max="500" />
  </div>

  <button id="refresh">Analyze</button>
  
  <p class="info-text">💡 Drag nodes to explore. Hover to see details. Larger nodes have higher PageRank scores.</p>

  <a href="/" class="back-btn">← Back to Home</a>
</div>

<script src="/static/graph.js"></script>

</body>
</html>
